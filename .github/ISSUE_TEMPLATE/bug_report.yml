name: Bug Report
description: Report a bug in agenteval
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: input
    id: version
    attributes:
      label: agenteval version
      placeholder: "0.1.0"
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
