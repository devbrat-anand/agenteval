site_name: agenteval
site_description: "pytest for AI agents — catch failures before production"
site_url: https://devbrat-anand.github.io/agenteval
repo_url: https://github.com/devbrat-anand/agenteval
repo_name: devbrat-anand/agenteval

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - search.suggest

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [../src]

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Guides:
    - Provider Setup: guides/providers.md
    - $0 Local Evals: guides/local-evals.md
    - CI/CD Integration: guides/ci-cd.md
    - Custom Evaluators: guides/custom-evaluators.md
    - Production Failure Modes: guides/production-failures.md
  - Reference:
    - Evaluators: reference/evaluators.md
    - Interceptors: reference/interceptors.md
    - CLI: reference/cli.md
