name: "agenteval"
description: "Run agenteval agent tests and post results as PR comment"
branding:
  icon: "check-circle"
  color: "green"

inputs:
  test_path:
    description: "Path to test files"
    required: false
    default: "tests/agent_evals/"
  fail_under:
    description: "Minimum average score threshold (0.0-1.0)"
    required: false
  eval_provider:
    description: "Eval provider (ollama, openai, bedrock)"
    required: false
  eval_model:
    description: "Eval model name"
    required: false
  python_version:
    description: "Python version"
    required: false
    default: "3.12"

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Set up Python
      shell: bash
      run: uv python install ${{ inputs.python_version }}

    - name: Install agenteval
      shell: bash
      run: pip install agenteval-ai[all]

    - name: Run agenteval
      shell: bash
      run: |
        CMD="agenteval run ${{ inputs.test_path }} --report json --report-dir agenteval-reports/"
        if [ -n "${{ inputs.fail_under }}" ]; then CMD="$CMD --fail-under ${{ inputs.fail_under }}"; fi
        $CMD
      env:
        AGENTEVAL_EVAL_PROVIDER: ${{ inputs.eval_provider }}
        AGENTEVAL_EVAL_MODEL: ${{ inputs.eval_model }}

    - name: Post PR comment
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          const reportDir = 'agenteval-reports/';
          if (!fs.existsSync(reportDir)) return;
          const files = fs.readdirSync(reportDir).filter(f => f.endsWith('.json'));
          if (files.length === 0) return;
          const report = JSON.parse(fs.readFileSync(path.join(reportDir, files[0]), 'utf8'));

          let table = '| Test | Score | Cost | Status |\n|------|-------|------|--------|\n';
          for (const test of report.tests) {
            const status = test.passed ? ':white_check_mark:' : ':x:';
            table += `| ${test.test_name} | ${test.overall_score.toFixed(2)} | $${test.trace.total_cost_usd.toFixed(4)} | ${status} |\n`;
          }

          const body = `## agenteval results\n\n${table}\n\n**${report.total_passed}/${report.tests.length} passed** | Avg score: ${report.avg_score.toFixed(2)} | Total cost: $${report.total_cost_usd.toFixed(4)}\n\n_Generated by [agenteval](https://github.com/devbrat-anand/agenteval)_`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes('## agenteval results'));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Upload report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: agenteval-report
        path: agenteval-reports/
